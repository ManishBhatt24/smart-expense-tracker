{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="glass-card">
            <div class="text-center mb-4">
                <span class="badge {% if db_info == 'Temporary' %}bg-warning{% else %}bg-success{% endif %} mb-2">
                    <i class="fas fa-database me-1"></i> {{ db_info }} Storage
                </span>
                <h2>Create Account</h2>
            </div>
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" name="confirm_password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-glass w-100 mt-3">Register</button>
            </form>
            <p class="text-center mt-3">Already have an account? <a href="{{ url_for('auth.login') }}" class="text-info">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
