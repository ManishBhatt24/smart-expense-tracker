{% extends "layout.html" %}

{% block content %}
<div class="row">
    <div class="col-md-5 mb-4">
        <div class="glass-card">
            <h3>Add Income Source</h3>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Amount</label>
                    <div class="input-group">
                        <span class="input-group-text">₹</span>
                        <input type="number" step="0.01" name="amount" class="form-control" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Source</label>
                    <input type="text" name="source" class="form-control" placeholder="Salary, Freelance, etc." required>
                </div>
                <button type="submit" class="btn btn-glass w-100" style="background: linear-gradient(135deg, #10B981, #3B82F6);">Add Income</button>
            </form>
        </div>
    </div>
    <div class="col-md-7">
        <div class="glass-card">
            <h3>Income History</h3>
            <div class="table-responsive">
                <table class="table table-hover mt-3 income-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Source</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for inc in incomes %}
                        <tr>
                            <td>{{ inc.date }}</td>
                            <td>{{ inc.source }}</td>
                            <td>₹{{ "{:,.2f}".format(inc.amount) }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
