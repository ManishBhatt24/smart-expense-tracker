{% extends "layout.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>All Expenses</h2>
    <a href="{{ url_for('expenses.add_expense') }}" class="btn btn-glass"><i class="fas fa-plus me-2"></i>Add New</a>
</div>

<div class="glass-card">
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Category</th>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for expense in expenses %}
                <tr>
                    <td>{{ expense.date }}</td>
                    <td><span class="badge bg-secondary">{{ expense.category }}</span></td>
                    <td>{{ expense.description }}</td>
                    <td>₹{{ "{:,.2f}".format(expense.amount) }}</td>
                    <td>
                        <a href="{{ url_for('expenses.edit_expense', id=expense.id) }}" class="text-info me-2"><i class="fas fa-edit"></i></a>
                        <a href="{{ url_for('expenses.delete_expense', id=expense.id) }}" class="text-danger" onclick="return confirm('Are you sure?')"><i class="fas fa-trash"></i></a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
