{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="glass-card">
            <h2 class="mb-4">Edit Income</h2>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Amount</label>
                    <div class="input-group">
                        <span class="input-group-text">₹</span>
                        <input type="number" step="0.01" name="amount" class="form-control" value="{{ income.amount }}" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Source</label>
                    <input type="text" name="source" class="form-control" value="{{ income.source }}" required>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-glass px-5" style="background: linear-gradient(135deg, #10B981, #3B82F6);">Update</button>
                    <a href="{{ url_for('income.add_income') }}" class="btn btn-glass px-4">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
