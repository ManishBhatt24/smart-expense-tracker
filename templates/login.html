{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="glass-card">
            <h2 class="text-center mb-4">Login</h2>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-glass w-100 mt-3">Login</button>
            </form>
            <p class="text-center mt-3">Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-info">Register here</a></p>
        </div>
    </div>
</div>
{% endblock %}
